name: Warm ping Render backend                                                                                                                                                            
                                                                                                                                                                                            
on:
  schedule:                                                                                                                                                                               
      # Every 10 min. GitHub Actions cron is best-effort — actual runs may
      # drift 5-15 min during high load. Render free tier spins down after                                                                                                                  
      # 15 min idle, so 10 min cron + drift = occasional cold starts.                                                                                                                       
      # Upgrade Render to Starter ($7/mo) for guaranteed always-on.                                                                                                                         
  - cron: '*/10 * * * *'                                                                                                                                                                
  workflow_dispatch:  # manual trigger from Actions tab for testing                                                                                                                       
                                                                                                                                                                                            
jobs:
  ping:
    runs-on: ubuntu-latest                             
    timeout-minutes: 2
    steps:                                                                                                                                                                                
      - name: Hit health endpoint
        run: |
            response=$(curl -sS -o /tmp/body -w "%{http_code}" \
              --max-time 60 \
              --retry 3 \
              --retry-delay 5 \
              "${{ vars.BACKEND_HEALTH_URL }}")          
            echo "::error::Health check failed with HTTP $response"
            exit 1